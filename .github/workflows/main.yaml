name: Docker CI/CD with GCP

on:
  push:
    branches:
      - main

jobs:
  docker-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t premchandpamidi/test:v1 .

      - name: Push Docker image
        run: docker push premchandpamidi/test:v1

      - name: Deploy to GCP
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.GCP_HOST}}
          username: ${{secrets.GCP_USER}}
          key: ${{secrets.GCP_KEY}}
          script: |
            docker pull premchandpamidi/test:v1
            doccker rm -f test || true
            docker run -d --name test -p 8095:80 premchandpamidi/test:v1
